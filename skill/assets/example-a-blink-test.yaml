# Example A — Blink test (life signal)
# Toggles the built-in LED every 1 second from firmware, AND exposes it to HA.
# USE THIS to confirm the device is alive. REMOVE the `interval:` block before
# using the light entity from HA — otherwise firmware fights HA control.
#
# Board: ESP32-C3 SuperMini (adjust GPIO + board/variant for other boards)

esphome:
  name: esp32-test
  friendly_name: ESP32 Test

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

logger:

api:
  encryption:
    key: "REPLACE_WITH_FRESH_KEY_base64_32bytes"

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Esp32-Test Fallback"
    password: !secret fallback_password

captive_portal:

output:
  - platform: gpio
    pin:
      number: GPIO8
      inverted: true     # C3 LED is active-low
    id: led_builtin

light:
  - platform: binary
    name: "LED Built-in"
    output: led_builtin
    id: led

# Firmware-driven blink — fights HA control, remove when switching to Example B
interval:
  - interval: 1s
    then:
      - light.toggle: led
