# Example B — HA-controlled LED (production)
# Exposes the built-in LED as a `light` entity in Home Assistant.
# No firmware-driven blink — HA has exclusive control.
#
# Board: ESP32-C3 SuperMini (adjust GPIO + board/variant for other boards)

esphome:
  name: esp32-test
  friendly_name: ESP32 Test

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

logger:

api:
  encryption:
    key: "REPLACE_WITH_FRESH_KEY_base64_32bytes"

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Esp32-Test Fallback"
    password: !secret fallback_password

captive_portal:

output:
  - platform: gpio
    pin:
      number: GPIO8
      inverted: true     # C3 LED is active-low
    id: led_builtin

light:
  - platform: binary
    name: "LED Built-in"
    output: led_builtin
    id: led
