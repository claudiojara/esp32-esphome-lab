esphome:
  name: esp32-test
  friendly_name: ESP32 Test

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

logger:

api:
  encryption:
    key: "REPLACE_WITH_FRESH_BASE64_KEY_PER_DEVICE"

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Esp32-Test Fallback"
    password: !secret fallback_password

captive_portal:

output:
  - platform: gpio
    pin:
      number: GPIO8
      inverted: true
    id: led_builtin

light:
  - platform: binary
    name: "LED Built-in"
    output: led_builtin
    id: led

i2c:
  sda: GPIO5
  scl: GPIO6
  scan: true
  frequency: 400kHz

time:
  - platform: homeassistant
    id: ha_time

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_medium
    size: 18
  - file: "gfonts://Roboto@700"
    id: font_big
    size: 32

sensor:
  - platform: homeassistant
    id: curtain_position
    entity_id: cover.YOUR_COVER_ENTITY
    attribute: current_position

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    id: oled
    update_interval: 1s
    contrast: 100%
    lambda: |-
      it.printf(0, 0, id(font_small), "CORTINA");
      it.strftime(128, 0, id(font_small), TextAlign::TOP_RIGHT, "%H:%M", id(ha_time).now());

      if (id(curtain_position).has_state()) {
        it.printf(64, 20, id(font_big), TextAlign::TOP_CENTER, "%.0f%%", id(curtain_position).state);
      } else {
        it.printf(64, 28, id(font_medium), TextAlign::TOP_CENTER, "--");
      }

      it.rectangle(0, 58, 128, 6);
      if (id(curtain_position).has_state()) {
        int w = (int)(id(curtain_position).state * 1.28f);
        it.filled_rectangle(0, 58, w, 6);
      }
