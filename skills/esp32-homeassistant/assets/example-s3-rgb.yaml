# ESP32-S3 with RGB WS2812 built-in LED (DevKitC-1 and SuperMini variants)
# The S3 built-in LED is an ADDRESSABLE RGB LED on GPIO48, NOT a simple GPIO LED.
# Do NOT use `output: gpio` + `light: binary` — use `light: esp32_rmt_led_strip`.

esphome:
  name: s3-test
  friendly_name: S3 Test

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

logger:

api:
  encryption:
    key: "REPLACE_WITH_FRESH_KEY_base64_32bytes"

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "S3-Test Fallback"
    password: !secret fallback_password

captive_portal:

light:
  - platform: esp32_rmt_led_strip
    name: "LED Built-in"
    id: led
    pin: GPIO48
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    default_transition_length: 0s
