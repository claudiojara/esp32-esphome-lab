esphome:
  name: esp32-test
  friendly_name: ESP32 Test

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

logger:

api:
  encryption:
    key: "REPLACE_WITH_FRESH_BASE64_KEY_PER_DEVICE"

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Esp32-Test Fallback"
    password: !secret fallback_password

captive_portal:

substitutions:
  ha_base_url: "http://HA_IP_OR_HOSTNAME:8123"

output:
  - platform: gpio
    pin:
      number: GPIO8
      inverted: true
    id: led_builtin

light:
  - platform: binary
    name: "LED Built-in"
    output: led_builtin
    id: led

i2c:
  sda: GPIO5
  scl: GPIO6
  scan: true
  frequency: 400kHz

time:
  - platform: homeassistant
    id: ha_time

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_medium
    size: 18
  - file: "gfonts://Roboto@700"
    id: font_big
    size: 32

sensor:
  - platform: homeassistant
    id: weather_temp
    entity_id: sensor.YOUR_TEMP_SENSOR

text_sensor:
  - platform: homeassistant
    id: weather_state
    entity_id: weather.YOUR_WEATHER_ENTITY
    on_value:
      - lambda: |-
          std::string state = id(weather_state).state;
          if (state.empty()) state = "unknown";
          std::string url = "${ha_base_url}/local/weather/" + state + ".png";
          id(weather_icon).set_url(url.c_str());
      - component.update: weather_icon

http_request:
  verify_ssl: false
  timeout: 10s

online_image:
  - url: "${ha_base_url}/local/weather/unknown.png"
    id: weather_icon
    type: BINARY
    format: PNG
    resize: 48x48
    update_interval: never

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    id: oled
    update_interval: 1s
    contrast: 100%
    lambda: |-
      // Icono del tiempo a la izquierda (48x48)
      it.image(0, 8, id(weather_icon));

      // Hora grande arriba a la derecha
      it.strftime(128, 0, id(font_big), TextAlign::TOP_RIGHT, "%H:%M", id(ha_time).now());

      // Temperatura bajo la hora
      if (id(weather_temp).has_state()) {
        it.printf(128, 38, id(font_medium), TextAlign::TOP_RIGHT, "%.0f C", id(weather_temp).state);
      }

      // Estado del tiempo abajo a la derecha (evita pisar el ícono)
      if (id(weather_state).has_state()) {
        it.printf(128, 54, id(font_small), TextAlign::TOP_RIGHT, "%s", id(weather_state).state.c_str());
      }
