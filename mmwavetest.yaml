esphome:
  name: mmwavetest
  friendly_name: mmWave Test

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

logger:
  level: INFO
  # El C3 usa USB-CDC para el logger, no compite con UART0/UART1 del sensor.

api:
  encryption:
    key: "hR7nQc4mJvK8xL2pF9sB6dN3tY1wE5aZ0oU7iM4lP8g="

ota:
  - platform: esphome
    password: "c14uv3ot4.,1016"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Mmwavetest Fallback"
    password: "Esp32Fallback32321"

captive_portal:

uart:
  id: ld2410_uart
  tx_pin: GPIO4
  rx_pin: GPIO3
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  uart_id: ld2410_uart

binary_sensor:
  - platform: ld2410
    has_target:
      name: Presence
    has_moving_target:
      name: Moving Target
    has_still_target:
      name: Still Target

sensor:
  - platform: ld2410
    moving_distance:
      name: Moving Distance
    still_distance:
      name: Still Distance
    moving_energy:
      name: Move Energy
    still_energy:
      name: Still Energy
    detection_distance:
      name: Detection Distance

number:
  - platform: ld2410
    timeout:
      name: Timeout
    max_move_distance_gate:
      name: Max Move Distance Gate
    max_still_distance_gate:
      name: Max Still Distance Gate

button:
  - platform: ld2410
    factory_reset:
      name: Factory Reset
    restart:
      name: Restart Sensor

text_sensor:
  - platform: ld2410
    version:
      name: LD2410 Firmware
    mac_address:
      name: LD2410 MAC
