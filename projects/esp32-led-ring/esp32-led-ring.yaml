substitutions:
  device_name: anillo
  friendly_name: Anillo
  led_pin: GPIO3
  num_leds: "16"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

logger:

api:
  encryption:
    key: "r3NyB+8G91QfgkZxyZLwg1GGdbFBZf/gtemafkuQ9oI="

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Anillo Fallback"
    password: !secret fallback_password

captive_portal:

light:
  - platform: esp32_rmt_led_strip
    id: ring
    name: None
    pin: ${led_pin}
    num_leds: ${num_leds}
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 300ms
    effects:
      - pulse:
          name: "Pulse"
          transition_length: 500ms
          update_interval: 500ms
      - pulse:
          name: "Pulse Fast"
          transition_length: 200ms
          update_interval: 200ms
      - strobe:
          name: "Strobe"
      - flicker:
          name: "Flicker"
      - addressable_rainbow:
          name: "Rainbow"
          speed: 10
          width: 50
      - addressable_rainbow:
          name: "Rainbow Fast"
          speed: 30
          width: 50
      - addressable_color_wipe:
          name: "Color Wipe"
          colors:
            - red: 100%
              green: 100%
              blue: 100%
              num_leds: 1
          add_led_interval: 100ms
          reverse: false
      - addressable_scan:
          name: "Scan"
          move_interval: 80ms
          scan_width: 1
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 5%
          progress_interval: 4ms
      - addressable_fireworks:
          name: "Fireworks"
          update_interval: 32ms
          spark_probability: 10%
          use_random_color: true
          fade_out_rate: 120
      - addressable_flicker:
          name: "Addressable Flicker"
          update_interval: 16ms
          intensity: 5%

  - platform: binary
    name: "Status LED"
    output: led_builtin
    id: status_led
    internal: true
    restore_mode: ALWAYS_ON

output:
  - platform: gpio
    pin:
      number: GPIO8
      inverted: true
    id: led_builtin
