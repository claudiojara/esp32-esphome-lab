esphome:
  name: esp32-test
  friendly_name: ESP32 Test

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

logger:

api:
  encryption:
    key: "dS2bbIsryPkeYMVaqL6jrJsmaMsQButBdp/MQ79dE/Q="

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Esp32-Test Fallback"
    password: !secret fallback_password

captive_portal:

substitutions:
  ha_base_url: "http://192.168.100.190:8123"

http_request:
  verify_ssl: false
  timeout: 10s

output:
  - platform: gpio
    pin:
      number: GPIO8
      inverted: true
    id: led_builtin

light:
  - platform: binary
    name: "LED Built-in"
    output: led_builtin
    id: led

i2c:
  sda: GPIO5
  scl: GPIO6
  scan: true
  frequency: 400kHz

uart:
  id: ld2410_uart
  tx_pin: GPIO4
  rx_pin: GPIO3
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  uart_id: ld2410_uart

time:
  - platform: homeassistant
    id: ha_time

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_medium
    size: 18
  - file: "gfonts://Roboto@700"
    id: font_big
    size: 32

image:
  - file: "avatar.png"
    id: img_avatar
    resize: 64x64
    type: BINARY
    dither: FloydSteinberg

sensor:
  - platform: homeassistant
    id: curtain_position
    entity_id: cover.curtain
    attribute: current_position

  - platform: homeassistant
    id: weather_temp
    entity_id: sensor.temperatura_actual_casa

  - platform: wifi_signal
    id: wifi_rssi
    update_interval: 30s

  - platform: uptime
    id: uptime_sec
    update_interval: 10s

  - platform: ld2410
    moving_distance:
      name: Moving Distance
      id: mmwave_moving_distance
    still_distance:
      name: Still Distance
      id: mmwave_still_distance
    moving_energy:
      name: Move Energy
      id: mmwave_moving_energy
    still_energy:
      name: Still Energy
      id: mmwave_still_energy
    detection_distance:
      name: Detection Distance
      id: mmwave_detection_distance

binary_sensor:
  - platform: gpio
    name: "Next Page Button"
    id: next_page_hw_btn
    pin:
      number: GPIO7
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 20ms
    on_press:
      - display.page.show_next: oled
      - component.update: oled

  - platform: ld2410
    has_target:
      name: Presence
      id: mmwave_presence
    has_moving_target:
      name: Moving Target
      id: mmwave_moving_target
    has_still_target:
      name: Still Target
      id: mmwave_still_target

text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip

  - platform: homeassistant
    id: weather_state
    entity_id: weather.forecast_casa
    on_value:
      - lambda: |-
          std::string state = id(weather_state).state;
          if (state.empty()) state = "unknown";
          std::string url = "${ha_base_url}/local/weather/" + state + ".png";
          id(weather_icon).set_url(url.c_str());
      - component.update: weather_icon

online_image:
  - url: "${ha_base_url}/local/weather/unknown.png"
    id: weather_icon
    type: BINARY
    format: PNG
    resize: 48x48
    update_interval: never

switch:
  - platform: template
    name: "Auto Rotate Pages"
    id: auto_rotate
    icon: mdi:autorenew
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

button:
  - platform: template
    name: "Next Page"
    id: next_page_btn
    icon: mdi:chevron-right-circle
    on_press:
      - display.page.show_next: oled
      - component.update: oled

interval:
  - interval: 5s
    then:
      - if:
          condition:
            switch.is_on: auto_rotate
          then:
            - display.page.show_next: oled
            - component.update: oled

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    id: oled
    update_interval: 1s
    contrast: 100%
    pages:
      - id: page_curtain
        lambda: |-
          it.printf(0, 0, id(font_small), "CORTINA");
          it.strftime(128, 0, id(font_small), TextAlign::TOP_RIGHT, "%H:%M", id(ha_time).now());

          if (id(curtain_position).has_state()) {
            it.printf(64, 20, id(font_big), TextAlign::TOP_CENTER, "%.0f%%", id(curtain_position).state);
          } else {
            it.printf(64, 28, id(font_medium), TextAlign::TOP_CENTER, "--");
          }

          it.rectangle(0, 58, 128, 6);
          if (id(curtain_position).has_state()) {
            int w = (int)(id(curtain_position).state * 1.28f);
            it.filled_rectangle(0, 58, w, 6);
          }

          if (id(mmwave_presence).state) {
            it.filled_circle(62, 4, 2);
          }

      - id: page_weather
        lambda: |-
          it.image(0, 8, id(weather_icon));
          it.strftime(128, 0, id(font_big), TextAlign::TOP_RIGHT, "%H:%M", id(ha_time).now());
          if (id(weather_temp).has_state()) {
            it.printf(128, 38, id(font_medium), TextAlign::TOP_RIGHT, "%.0f C", id(weather_temp).state);
          }
          if (id(weather_state).has_state()) {
            it.printf(128, 54, id(font_small), TextAlign::TOP_RIGHT, "%s", id(weather_state).state.c_str());
          }

          if (id(mmwave_presence).state) {
            it.filled_circle(62, 4, 2);
          }

      - id: page_system
        lambda: |-
          it.printf(0, 0, id(font_small), "SISTEMA");
          it.line(0, 14, 128, 14);

          if (id(wifi_ip).has_state()) {
            it.printf(0, 18, id(font_small), "IP: %s", id(wifi_ip).state.c_str());
          }

          if (id(wifi_rssi).has_state()) {
            it.printf(0, 32, id(font_small), "WiFi: %.0f dBm", id(wifi_rssi).state);
          }

          if (id(uptime_sec).has_state()) {
            int s = (int) id(uptime_sec).state;
            int h = s / 3600;
            int m = (s % 3600) / 60;
            it.printf(0, 46, id(font_small), "Up: %dh %dm", h, m);
          }

          if (id(mmwave_presence).state) {
            it.filled_circle(62, 4, 2);
          }

      - id: page_avatar
        lambda: |-
          it.image(0, 0, id(img_avatar));
          if (id(mmwave_presence).state) {
            bool moving = id(mmwave_moving_target).state;
            float dist = moving
              ? (id(mmwave_moving_distance).has_state() ? id(mmwave_moving_distance).state : 0)
              : (id(mmwave_still_distance).has_state() ? id(mmwave_still_distance).state : 0);
            it.printf(96, 8, id(font_small), TextAlign::TOP_CENTER, moving ? "TE VEO" : "AHI ESTAS");
            it.printf(96, 28, id(font_small), TextAlign::TOP_CENTER, "%.0fcm", dist);
            it.printf(96, 48, id(font_small), TextAlign::TOP_CENTER, moving ? "MOVIL" : "QUIETO");
          } else {
            it.printf(96, 8, id(font_small), TextAlign::TOP_CENTER, "HOLA");
            it.printf(96, 28, id(font_small), TextAlign::TOP_CENTER, "SOY");
            it.printf(96, 48, id(font_small), TextAlign::TOP_CENTER, "CLAU");
          }

      - id: page_presence
        lambda: |-
          it.printf(0, 0, id(font_small), "PRESENCIA");
          it.strftime(128, 0, id(font_small), TextAlign::TOP_RIGHT, "%H:%M", id(ha_time).now());
          it.line(0, 14, 128, 14);

          if (id(mmwave_presence).state) {
            const char* tipo = "QUIETO";
            if (id(mmwave_moving_target).state) tipo = "MOVIL";
            it.printf(64, 18, id(font_medium), TextAlign::TOP_CENTER, "%s", tipo);

            float dist = id(mmwave_moving_target).state
              ? (id(mmwave_moving_distance).has_state() ? id(mmwave_moving_distance).state : 0)
              : (id(mmwave_still_distance).has_state() ? id(mmwave_still_distance).state : 0);
            float energy = id(mmwave_moving_target).state
              ? (id(mmwave_moving_energy).has_state() ? id(mmwave_moving_energy).state : 0)
              : (id(mmwave_still_energy).has_state() ? id(mmwave_still_energy).state : 0);

            it.printf(0, 40, id(font_small), "Dist: %.0f cm", dist);
            it.printf(0, 52, id(font_small), "Energia: %.0f%%", energy);
          } else {
            it.printf(64, 28, id(font_medium), TextAlign::TOP_CENTER, "VACIO");
          }

          if (id(mmwave_presence).state) {
            it.filled_circle(62, 4, 2);
          }
