; PlatformIO config para ESP32-C3 SuperMini
; Hourglass project - 2x MAX7219 8x8 chain con sand physics + MQTT a HA

[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; USB CDC nativo del C3 — sin esto Serial no anda por USB
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
upload_speed = 921600

; Libs se irán sumando por fase. Phase 1.5 (blink) no necesita ninguna.
; Phase 2.A: majicdesigns/MD_MAX72XX para drive de la chain
; Phase 2.B: knolleary/PubSubClient para MQTT, WiFi (built-in)
lib_deps =
