substitutions:
  device_name: tetris
  friendly_name: Tetris
  led_pin: GPIO3
  num_leds: "128"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - tetris_engine.h
  # Al boot: enciende el strip + selecciona effect "Game" para que se vea
  # la pantalla idle (T gris) sin tener que apretar nada en HA.
  # priority -100 corre tarde en el setup, ya con WiFi y light inicializados.
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: board_strip
          brightness: 100%
          effect: "Game"

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: "cF9CeSmL79Ak2Gw3RacBfVmWZGDfihrFBsa1Qpj8k+s="

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Tetris Fallback"
    password: !secret fallback_password

captive_portal:

# Number entity en HA para el modo Manual: arrastrás el slider y se prende ese LED
number:
  - platform: template
    name: "Manual LED Index"
    id: manual_led_index
    min_value: 0
    max_value: 127
    step: 1
    initial_value: 0
    optimistic: true
    mode: slider

light:
  - platform: esp32_rmt_led_strip
    id: board_strip
    name: None
    pin: ${led_pin}
    num_leds: ${num_leds}
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 0s
    # Sin gamma correction: para pixel-art (Tetris) los colores tienen
    # que pasar tal cual los seteamos. Default 2.8 aplasta valores bajos
    # casi a negro y arruina la calibración.
    gamma_correct: 1.0
    effects:
      # Modo 1 — Walk: prende UN LED a la vez recorriendo 0→127.
      # Loguea el índice así podés grabar video y mapear orden físico.
      - addressable_lambda:
          name: "Walk"
          update_interval: 300ms
          lambda: |-
            static int idx = 0;
            it.all() = Color::BLACK;
            it[idx] = Color(255, 0, 0);
            ESP_LOGI("calib", "LED index: %d", idx);
            idx = (idx + 1) % it.size();

      # Modo 2 — Manual: prende solo el LED del slider de HA.
      # Sirve para confirmar "¿es el LED 64 el primero del segundo panel?".
      - addressable_lambda:
          name: "Manual"
          update_interval: 100ms
          lambda: |-
            int idx = (int) id(manual_led_index).state;
            it.all() = Color::BLACK;
            if (idx >= 0 && idx < (int) it.size()) {
              it[idx] = Color(0, 255, 0);
            }

      # Modo 3 — Stripe x8: cada grupo de 8 LEDs un color distinto.
      # Revela visualmente el patrón serpentine: si las filas alternan
      # dirección, vas a ver bandas zigzag; si todas van en el mismo
      # sentido, vas a ver bandas paralelas.
      - addressable_lambda:
          name: "Stripe x8"
          update_interval: 1s
          lambda: |-
            static const Color palette[16] = {
              Color(120,   0,   0), Color(  0, 120,   0), Color(  0,   0, 120), Color(120, 120,   0),
              Color(120,   0, 120), Color(  0, 120, 120), Color(120,  60,   0), Color( 60,   0, 120),
              Color(120,  60,  60), Color( 60, 120,  60), Color( 60,  60, 120), Color(120, 120,  60),
              Color(120,  60, 120), Color( 60, 120, 120), Color(120, 120, 120), Color( 60,  60,  60),
            };
            for (int i = 0; i < (int) it.size(); i++) {
              it[i] = palette[(i / 8) % 16];
            }

      # Modo 4 — Halves: primeros 64 azules, siguientes 64 rojos.
      # Confirma que la cadena entre panel 1 y panel 2 está en orden.
      - addressable_lambda:
          name: "Halves"
          update_interval: 1s
          lambda: |-
            for (int i = 0; i < (int) it.size(); i++) {
              if (i < 64)        it[i] = Color(0, 0, 120);
              else               it[i] = Color(120, 0, 0);
            }

      # Modo 5 — Game: render del estado actual del engine de Tetris.
      # 50ms de update da una sensación fluida y baja latencia desde input HA.
      - addressable_lambda:
          name: "Game"
          update_interval: 50ms
          lambda: |-
            tetris::game.render(it);

# Game loop: gravity tick cada 800ms. La pieza activa baja un cuadro;
# si choca, se lockea y spawnea la siguiente.
interval:
  - interval: 800ms
    then:
      - lambda: 'tetris::game.tick();'

# Sensors expuestos a HA — score y líneas acumuladas.
sensor:
  - platform: template
    name: "Score"
    id: tetris_score
    update_interval: 500ms
    accuracy_decimals: 0
    lambda: 'return tetris::game.score;'
  - platform: template
    name: "Lines"
    id: tetris_lines
    update_interval: 500ms
    accuracy_decimals: 0
    lambda: 'return tetris::game.lines;'

# Controles HA. Latencia ~50-150ms — aceptable con tick 800ms para v1.
button:
  - platform: template
    name: "Left"
    on_press:
      - lambda: 'tetris::game.move_left();'

  - platform: template
    name: "Right"
    on_press:
      - lambda: 'tetris::game.move_right();'

  - platform: template
    name: "Rotate"
    on_press:
      - lambda: 'tetris::game.rotate();'

  - platform: template
    name: "Drop"
    on_press:
      - lambda: 'tetris::game.hard_drop();'

  # Un solo botón arranca todo: prende el strip, selecciona effect "Game"
  # y resetea el estado del engine.
  - platform: template
    name: "New Game"
    on_press:
      - light.turn_on:
          id: board_strip
          brightness: 100%
          effect: "Game"
      - lambda: 'tetris::game.new_game();'
